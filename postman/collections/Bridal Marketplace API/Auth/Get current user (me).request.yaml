$kind: http-request
name: Get current user (me)
description: Returns the authenticated user's profile and shop (if seller). Requires login.
url: http://localhost:3000/api/me
method: GET
headers:
  Authorization: Bearer [{{accessToken}}
queryParams:
  - key: Cookie
    value: sb-gtowdvdmaqgjvjobsfwn-auth-token=base64-
    disabled: true
order: 1000
